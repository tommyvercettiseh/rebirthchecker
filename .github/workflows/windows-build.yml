name: Test and build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyinstaller
      - name: Run tests
        run: pytest -q
      - name: Build EXE
        run: pyinstaller --noconfirm --clean --onefile --windowed --name RebirthChecker app.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RebirthChecker-Windows
          path: dist/RebirthChecker.exe
